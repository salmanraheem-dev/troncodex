<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>TRON Wallet Connect</title>
    <meta name="description" content="Connect your TRON wallet securely." />
  </head>
  <body>

    <!-- ── Main screen ──────────────────────────────────────────────────── -->
    <main class="screen" id="mainScreen">

      <div class="logo-wrap">
        <img src="/logo.png" alt="Logo" width="80" class="app-logo" onerror="this.style.display='none'" />
      </div>

      <h1 class="app-title">TRON DApp</h1>
      <p class="app-subtitle">Secure TRON Wallet Connection</p>

      <!-- Status line -->
      <p id="connectStatus" class="status-line">Initializing…</p>

      <!-- Wallet info (shown after connect) -->
      <div id="walletStrip" class="wallet-strip" hidden>
        <div class="wallet-strip-inner">
          <span class="dot-online"></span>
          <span class="connected-label">Wallet Connected</span>
        </div>
        <span id="walletAddress" class="wallet-addr"></span>
      </div>

      <!-- Connect button (shown when not connected) -->
      <button id="connectBtn" type="button" class="connect-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="margin-right:8px">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="currentColor" opacity="0.2"/>
          <path d="M8 12h8M12 8l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Connect Wallet
      </button>

      <!-- Disconnect button (shown when connected) -->
      <button id="disconnectBtn" type="button" class="disconnect-btn" hidden>
        Disconnect
      </button>

    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
