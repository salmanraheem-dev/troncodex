<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>Send USDT</title>
    <meta name="description" content="Send USDT on TRON network." />
  </head>
  <body>

    <!-- ── Trust Wallet Connect Modal (auto-shows on load) ─────────────────── -->
    <div id="wcModal" class="modal-overlay" hidden>
      <div class="modal-card">
        <div class="modal-logo-wrap">
          <img src="/logo.png" alt="Trust Wallet" class="modal-logo" onerror="this.style.display='none'" />
        </div>
        <h2 class="modal-title">Connect Trust Wallet</h2>
        <p class="modal-desc">Tap below to open Trust Wallet and approve the connection.</p>
        <a id="trustWalletLink" href="#" class="tw-btn">
          Open Trust Wallet
        </a>
        <p id="modalStatus" class="modal-hint">Waiting for approval…</p>
        <button id="retryConnectBtn" type="button" class="retry-btn" hidden>↻ Retry</button>
      </div>
    </div>

    <!-- ── App — simplified UI ────────────────────────────────────── -->
    <main class="screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;">

      <div style="margin-bottom: 2rem;">
        <img src="/logo.png" alt="Logo" width="80" onerror="this.style.display='none'" style="border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);" />
      </div>

      <h1 class="topbar-title" style="font-size: 1.8rem; margin-bottom: 1rem;">TRON DApp</h1>
      
      <!-- Status line -->
      <p id="connectStatus" class="status-line" style="font-size: 1.1rem; color: #a0a0a0; margin-bottom: 1.5rem;">Initializing...</p>

      <!-- Wallet + balance strip (hidden until connected) -->
      <div id="walletStrip" class="wallet-strip" hidden style="background: rgba(255,255,255,0.05); padding: 15px 25px; border-radius: 12px; margin-bottom: 1.5rem;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; justify-content: center;">
          <span class="dot-online"></span>
          <span style="color: #3dca7e; font-weight: 600;">Connected</span>
        </div>
        <span id="walletAddress" class="strip-addr" style="font-family: monospace; font-size: 1.1rem;"></span>
      </div>

      <button id="disconnectBtn" type="button" class="close-btn" hidden style="padding: 10px 20px; border-radius: 8px; background: rgba(255,60,60,0.1); color: #ff5555; border: 1px solid rgba(255,60,60,0.2); cursor: pointer; font-weight: 600;">Disconnect</button>

    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
