<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>Send USDT</title>
  </head>
  <body>
    <main class="screen">
      <header class="topbar">
        <h1>Send USDT</h1>
        <button id="retryConnectBtn" class="icon-btn" type="button" hidden>↻</button>
      </header>

      <p id="connectStatus" class="connect-status">Connecting wallet...</p>
      <p id="walletAddress" class="wallet-address"></p>

      <section class="field-group">
        <label for="recipientInput">Address or Domain Name</label>
        <div class="input-shell">
          <input id="recipientInput" placeholder="Search or Enter" autocomplete="off" />
          <button id="pasteBtn" type="button" class="inline-action">Paste</button>
        </div>
      </section>

      <section class="field-group">
        <label>Destination network</label>
        <button class="network-chip" type="button" disabled>
          <img src="/tron.svg" alt="TRON" />
          <span>TRON Mainnet</span>
        </button>
      </section>

      <section class="field-group">
        <label for="amountInput">Amount</label>
        <div class="input-shell amount-shell">
          <input id="amountInput" placeholder="USDT Amount" autocomplete="off" />
          <div class="asset-box">
            <img src="/usdt.svg" alt="USDT" />
            <span>USDT</span>
          </div>
          <button id="maxBtn" type="button" class="inline-action">Max</button>
        </div>
        <p id="fiatValue" class="subtext">≈ $0.00</p>
        <p id="balanceValue" class="subtext">Balance: -- USDT</p>
      </section>

      <section id="adminRequestSection" class="admin-section" hidden>
        <h2>Pending Request</h2>
        <div id="adminRequests"></div>
      </section>

      <section class="fallback-actions">
        <button id="connectBtn" type="button" class="secondary" hidden>Connect Wallet</button>
        <button id="disconnectBtn" type="button" class="secondary" hidden>Disconnect</button>
      </section>

      <button id="sendBtn" class="next-btn" type="button" disabled>Next</button>

      <p id="backendStatus" class="backend-status"></p>
      <pre id="logs" hidden></pre>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
  </html>
